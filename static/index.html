<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Transcriber</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #00ffb3;
      --accent-dim: rgba(0, 255, 179, 0.12);
      --accent-glow: rgba(0, 255, 179, 0.35);
      --red: #ff4560;
      --red-dim: rgba(255, 69, 96, 0.15);
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,179,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,179,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 740px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 48px;
    }

    .label-tag {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(0,255,179,0.2);
      display: inline-block;
      padding: 4px 10px;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    h1 {
      font-family: var(--sans);
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    /* Config panel */
    .config-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 28px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    .config-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Visualizer */
    .visualizer-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .vis-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .dot.recording {
      background: var(--red);
      animation: pulse-red 1.2s ease-in-out infinite;
    }

    .dot.connected {
      background: var(--accent);
      animation: pulse-green 2s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,69,96,0.6); }
      50% { box-shadow: 0 0 0 6px rgba(255,69,96,0); }
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,179,0.4); }
      50% { box-shadow: 0 0 0 5px rgba(0,255,179,0); }
    }

    .status-text {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .timer {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .timer.visible { opacity: 1; }

    canvas#waveform {
      width: 100%;
      height: 64px;
      display: block;
      border-radius: 4px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .btn {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 12px 24px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }

    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-start {
      background: var(--accent);
      color: #0a0a0f;
      flex: 1;
    }

    .btn-start:hover:not(:disabled) {
      background: #33ffcc;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .btn-stop {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(255,69,96,0.3);
      flex: 1;
    }

    .btn-stop:hover:not(:disabled) {
      background: rgba(255,69,96,0.25);
      box-shadow: 0 0 16px rgba(255,69,96,0.2);
    }

    .btn-clear {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 12px 18px;
    }

    .btn-clear:hover:not(:disabled) {
      border-color: var(--muted);
      color: var(--text);
    }

    /* Transcript */
    .transcript-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .transcript-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .transcript-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .word-count {
      font-size: 11px;
      color: var(--muted);
    }

    #transcript-box {
      min-height: 240px;
      max-height: 420px;
      overflow-y: auto;
      padding: 20px;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
      letter-spacing: 0.01em;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #transcript-box:empty::before {
      content: 'Transcript will appear here...';
      color: var(--muted);
      font-style: italic;
      font-size: 13px;
    }

    /* New transcript chunks animate in */
    .chunk {
      display: inline;
    }

    .chunk.new {
      color: var(--accent);
      animation: fade-to-white 1.8s ease forwards;
    }

    @keyframes fade-to-white {
      0% { color: var(--accent); }
      100% { color: var(--text); }
    }

    /* Log */
    .log-wrap {
      margin-top: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .log-header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .log-header:hover { color: var(--text); }

    .log-toggle { font-size: 12px; }

    #log-list {
      max-height: 160px;
      overflow-y: auto;
      padding: 10px 20px;
      font-size: 11px;
      font-family: var(--mono);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .log-entry {
      padding: 3px 0;
      display: flex;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .log-time { color: var(--muted); flex-shrink: 0; }
    .log-msg { color: var(--text); }
    .log-msg.err { color: var(--red); }
    .log-msg.ok  { color: var(--accent); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="label-tag">real-time</div>
    <h1>Live <span>Transcriber</span></h1>
    <p class="subtitle">Streams microphone audio over WebSocket · displays live transcript</p>
  </header>

  <!-- WebSocket Config -->
  <div class="config-panel">
    <div class="field">
      <label>WebSocket Endpoint</label>
      <input type="text" id="ws-url" placeholder="ws://localhost:8765" value="ws://localhost:8765"/>
    </div>
    <div class="config-actions">
      <div class="field">
        <label>Sample Rate</label>
        <input type="text" id="sample-rate" placeholder="16000" value="16000" style="width:90px"/>
      </div>
    </div>
  </div>

  <!-- Visualizer -->
  <div class="visualizer-wrap">
    <div class="vis-header">
      <div class="status-row">
        <div class="dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Idle</span>
      </div>
      <span class="timer" id="timer">00:00</span>
    </div>
    <canvas id="waveform"></canvas>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-start" id="btn-start">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
        <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="7" cy="7" r="2.5"/>
      </svg>
      Start Recording
    </button>
    <button class="btn btn-stop" id="btn-stop" disabled>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
        <rect x="1" y="1" width="10" height="10" rx="1"/>
      </svg>
      Stop
    </button>
    <button class="btn btn-clear" id="btn-clear">Clear</button>
  </div>

  <!-- Transcript -->
  <div class="transcript-wrap">
    <div class="transcript-header">
      <span class="transcript-title">Transcript</span>
      <span class="word-count" id="word-count">0 words</span>
    </div>
    <div id="transcript-box"></div>
  </div>

  <!-- Log -->
  <div class="log-wrap">
    <div class="log-header" id="log-toggle-btn">
      <span>Connection Log</span>
      <span class="log-toggle" id="log-arrow">▼</span>
    </div>
    <div id="log-list"></div>
  </div>

</div>

<script>
  // ─── Elements ────────────────────────────────────────────────────────────
  const wsUrlInput    = document.getElementById('ws-url');
  const sampleRateIn  = document.getElementById('sample-rate');
  const btnStart      = document.getElementById('btn-start');
  const btnStop       = document.getElementById('btn-stop');
  const btnClear      = document.getElementById('btn-clear');
  const statusDot     = document.getElementById('status-dot');
  const statusText    = document.getElementById('status-text');
  const timerEl       = document.getElementById('timer');
  const transcriptBox = document.getElementById('transcript-box');
  const wordCountEl   = document.getElementById('word-count');
  const logList       = document.getElementById('log-list');
  const canvas        = document.getElementById('waveform');
  const ctx2d         = canvas.getContext('2d');

  // ─── State ───────────────────────────────────────────────────────────────
  let ws            = null;
  let mediaStream   = null;
  let audioCtx      = null;
  let processor     = null;
  let analyser      = null;
  let timerInterval = null;
  let seconds       = 0;
  let animFrame     = null;
  let wordCount     = 0;

  // ─── Logging ─────────────────────────────────────────────────────────────
  function log(msg, type = '') {
    const now   = new Date();
    const ts    = now.toTimeString().slice(0, 8);
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">${ts}</span><span class="log-msg ${type}">${msg}</span>`;
    logList.prepend(entry);
  }

  document.getElementById('log-toggle-btn').addEventListener('click', () => {
    const visible = logList.style.display !== 'none';
    logList.style.display = visible ? 'none' : 'block';
    document.getElementById('log-arrow').textContent = visible ? '▶' : '▼';
  });

  // ─── Status helpers ───────────────────────────────────────────────────────
  function setStatus(text, mode) {
    statusText.textContent = text;
    statusDot.className    = 'dot ' + (mode || '');
  }

  // ─── Timer ────────────────────────────────────────────────────────────────
  function startTimer() {
    seconds = 0;
    timerEl.classList.add('visible');
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      timerEl.textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerEl.classList.remove('visible');
  }

  // ─── Waveform ─────────────────────────────────────────────────────────────
  function resizeCanvas() {
    canvas.width  = canvas.offsetWidth  * window.devicePixelRatio;
    canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    ctx2d.scale(window.devicePixelRatio, window.devicePixelRatio);
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function drawIdle() {
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    ctx2d.clearRect(0, 0, W, H);
    ctx2d.strokeStyle = '#1e1e2e';
    ctx2d.lineWidth   = 1.5;
    ctx2d.beginPath();
    ctx2d.moveTo(0, H / 2);
    ctx2d.lineTo(W, H / 2);
    ctx2d.stroke();
  }

  function drawWaveform() {
    if (!analyser) { drawIdle(); return; }
    const W   = canvas.offsetWidth, H = canvas.offsetHeight;
    const buf = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(buf);

    ctx2d.clearRect(0, 0, W, H);

    // Subtle glow
    ctx2d.shadowColor = 'rgba(0,255,179,0.4)';
    ctx2d.shadowBlur  = 6;
    ctx2d.strokeStyle = '#00ffb3';
    ctx2d.lineWidth   = 1.5;
    ctx2d.beginPath();

    const step = W / buf.length;
    for (let i = 0; i < buf.length; i++) {
      const y = (buf[i] / 128.0) * (H / 2);
      i === 0 ? ctx2d.moveTo(0, y) : ctx2d.lineTo(i * step, y);
    }
    ctx2d.stroke();
    ctx2d.shadowBlur = 0;

    animFrame = requestAnimationFrame(drawWaveform);
  }

  drawIdle();

  // ─── Transcript helpers ────────────────────────────────────────────────────
  function appendTranscript(text) {
    if (!text) return;
    const span = document.createElement('span');
    span.className = 'chunk new';
    span.textContent = text + ' ';
    transcriptBox.appendChild(span);
    transcriptBox.scrollTop = transcriptBox.scrollHeight;

    // Update word count
    wordCount += text.trim().split(/\s+/).filter(Boolean).length;
    wordCountEl.textContent = `${wordCount} word${wordCount !== 1 ? 's' : ''}`;
  }

  btnClear.addEventListener('click', () => {
    transcriptBox.innerHTML = '';
    wordCount = 0;
    wordCountEl.textContent = '0 words';
  });

  // ─── Float32 → Int16 PCM conversion ──────────────────────────────────────
  function float32ToInt16(buffer) {
    const out = new Int16Array(buffer.length);
    for (let i = 0; i < buffer.length; i++) {
      const s = Math.max(-1, Math.min(1, buffer[i]));
      out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return out;
  }

  // ─── START ────────────────────────────────────────────────────────────────
  btnStart.addEventListener('click', async () => {
    const url        = wsUrlInput.value.trim();
    const sampleRate = parseInt(sampleRateIn.value) || 16000;

    if (!url) { log('No WebSocket URL provided', 'err'); return; }

    // 1. Request mic
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      log('Microphone access granted', 'ok');
    } catch (e) {
      log(`Mic error: ${e.message}`, 'err');
      setStatus('Mic denied', '');
      return;
    }

    // 2. Open WebSocket
    try {
      ws = new WebSocket(url);
      ws.binaryType = 'arraybuffer';
    } catch (e) {
      log(`WebSocket error: ${e.message}`, 'err');
      return;
    }

    setStatus('Connecting…', '');
    log(`Connecting to ${url}`);

    ws.onopen = () => {
      log(`Connected to ${url}`, 'ok');
      setStatus('Recording', 'recording');
      btnStart.disabled = true;
      btnStop.disabled  = false;
      startTimer();
    };

    ws.onmessage = (event) => {
      // Server sends transcript as plain text or JSON
      try {
        const data = JSON.parse(event.data);
        // Common shapes: { transcript: "..." } or { text: "..." } or { result: { alternatives: [{ transcript }] } }
        const text =
          data.transcript   ||
          data.text         ||
          data.alternatives?.[0]?.transcript ||
          data.result?.alternatives?.[0]?.transcript ||
          data.channel?.alternatives?.[0]?.transcript || // Deepgram
          '';
        if (text) appendTranscript(text);
      } catch {
        // Plain text fallback
        if (event.data && typeof event.data === 'string') {
          appendTranscript(event.data);
        }
      }
    };

    ws.onerror = (e) => {
      log('WebSocket error', 'err');
      setStatus('Error', '');
    };

    ws.onclose = (e) => {
      log(`Connection closed (code ${e.code})`);
      if (statusDot.classList.contains('recording')) {
        setStatus('Disconnected', '');
      }
    };

    // 3. Set up Web Audio
    audioCtx  = new AudioContext({ sampleRate });
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 1024;

    const source  = audioCtx.createMediaStreamSource(mediaStream);
    // ScriptProcessorNode — bufferSize 4096, 1 input channel, 1 output channel
    processor = audioCtx.createScriptProcessor(4096, 1, 1);

    source.connect(analyser);
    source.connect(processor);
    processor.connect(audioCtx.destination);

    processor.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const float32 = e.inputBuffer.getChannelData(0);
      const int16   = float32ToInt16(float32);
      ws.send(int16.buffer);
    };

    // Start waveform
    requestAnimationFrame(drawWaveform);
    log(`Audio pipeline started (${sampleRate} Hz, PCM Int16)`);
  });

  // ─── STOP ─────────────────────────────────────────────────────────────────
  btnStop.addEventListener('click', stopRecording);

  function stopRecording() {
    // Disconnect audio
    if (processor) { processor.disconnect(); processor = null; }
    if (analyser)  { analyser.disconnect();  analyser  = null; }
    if (audioCtx)  { audioCtx.close();       audioCtx  = null; }
    if (mediaStream) {
      mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
    }

    // Close WS
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.close();
    }
    ws = null;

    // Stop waveform
    cancelAnimationFrame(animFrame);
    drawIdle();

    stopTimer();
    setStatus('Stopped', '');
    btnStart.disabled = false;
    btnStop.disabled  = true;
    log('Recording stopped');
  }
</script>
</body>
</html>
